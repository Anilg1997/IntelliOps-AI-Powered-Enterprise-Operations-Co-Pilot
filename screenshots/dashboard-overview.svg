  <!-- Order Row 4 -->
  <line x1="52" y1="510" x2="792" y2="510" stroke="#f0f0f0"/>
  <text x="68" y="528" font-size="13" font-weight="600" fill="#1a237e">ORD-20250104-G7H8</text>
  <text x="200" y="528" font-size="13" fill="#333">DataFlow Ltd</text>
