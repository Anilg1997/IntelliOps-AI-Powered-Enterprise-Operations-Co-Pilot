  <line x1="52" y1="430" x2="792" y2="430" stroke="#f0f0f0"/>
  <text x="68" y="448" font-size="13" font-weight="600" fill="#1a237e">ORD-20250102-C3D4</text>
  <text x="200" y="448" font-size="13" fill="#333">TechStart Inc</text>
  <rect x="380" y="436" width="80" height="22" rx="10" fill="#fff3e0"/>
  <text x="420" y="452" text-anchor="middle" font-size="11" font-weight="600" fill="#f57c00">PENDING</text>
  <text x="500" y="448" font-size="13" font-weight="600" fill="#333">₹67,800</text>
  <text x="620" y="448" font-size="12" fill="#888">Jan 14, 2025</text>

  <!-- Order Row 3 -->
  <line x1="52" y1="470" x2="792" y2="470" stroke="#f0f0f0"/>
  <text x="68" y="488" font-size="13" font-weight="600" fill="#1a237e">ORD-20250103-E5F6</text>
  <text x="200" y="488" font-size="13" fill="#333">GlobalRetail</text>
