<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <linearGradient id="nav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#f5f7fa"/>

  <!-- Navbar -->
  <rect width="1280" height="56" fill="url(#nav)"/>
  <text x="24" y="36" font-size="20" font-weight="700" fill="white">⚡ IntelliOps</text>
  <text x="200" y="36" font-size="14" fill="rgba(255,255,255,0.8)">Dashboard</text>
  <text x="300" y="36" font-size="14" fill="rgba(255,255,255,0.8)">Orders</text>
  <text x="390" y="36" font-size="14" fill="rgba(255,255,255,0.8)">AI Co-Pilot</text>

  <!-- User Info -->
  <circle cx="1180" cy="28" r="14" fill="rgba(255,255,255,0.2)"/>
  <text x="1180" y="33" text-anchor="middle" font-size="12" font-weight="600" fill="white">J</text>
  <text x="1090" y="33" font-size="13" fill="rgba(255,255,255,0.9)">John Doe</text>
  <circle cx="1210" cy="28" r="5" fill="#4caf50"/>

  <!-- Page Header -->
  <text x="32" y="96" font-size="24" font-weight="700" fill="#1a1a2e">Dashboard</text>
  <text x="32" y="118" font-size="13" fill="#888">Enterprise Operations Overview</text>

  <!-- Stats Cards -->
  <rect x="32" y="140" width="280" height="120" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="32" y="140" width="8" height="120" rx="4" fill="url(#grad1)"/>
  <text x="60" y="180" font-size="32" font-weight="700" fill="#1a237e">156</text>
  <text x="60" y="200" font-size="12" fill="#666">Total Orders</text>
  <text x="270" y="180" font-size="24">📋</text>

  <rect x="332" y="140" width="280" height="120" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="332" y="140" width="8" height="120" rx="4" fill="url(#grad2)"/>
  <text x="360" y="180" font-size="32" font-weight="700" fill="#1a237e">₹2.4M</text>
  <text x="360" y="200" font-size="12" fill="#666">Total Revenue</text>
  <text x="570" y="180" font-size="24">💰</text>

  <rect x="632" y="140" width="280" height="120" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="632" y="140" width="8" height="120" rx="4" fill="url(#grad3)"/>
  <text x="660" y="180" font-size="32" font-weight="700" fill="#1a237e">842</text>
  <text x="660" y="200" font-size="12" fill="#666">Products in Stock</text>
  <text x="870" y="180" font-size="24">📦</text>

  <rect x="932" y="140" width="320" height="120" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="932" y="140" width="8" height="120" rx="4" fill="url(#grad4)"/>
  <text x="960" y="180" font-size="32" font-weight="700" fill="#1a237e">98.5%</text>
