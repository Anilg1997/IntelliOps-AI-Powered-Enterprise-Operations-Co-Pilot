  <text x="200" y="360" font-size="11" font-weight="600" fill="#888">CUSTOMER</text>
  <text x="380" y="360" font-size="11" font-weight="600" fill="#888">STATUS</text>
  <text x="500" y="360" font-size="11" font-weight="600" fill="#888">AMOUNT</text>
  <text x="620" y="360" font-size="11" font-weight="600" fill="#888">DATE</text>

  <!-- Order Row 1 -->
  <line x1="52" y1="390" x2="792" y2="390" stroke="#f0f0f0"/>
  <text x="68" y="408" font-size="13" font-weight="600" fill="#1a237e">ORD-20250101-A1B2</text>
  <text x="200" y="408" font-size="13" fill="#333">Acme Corp</text>
  <rect x="380" y="396" width="80" height="22" rx="10" fill="#e8f5e9"/>
