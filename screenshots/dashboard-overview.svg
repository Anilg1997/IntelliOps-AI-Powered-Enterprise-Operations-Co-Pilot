  <text x="420" y="532" text-anchor="middle" font-size="11" font-weight="600" fill="#1976d2">CONFIRMED</text>
  <text x="500" y="528" font-size="13" font-weight="600" fill="#333">₹89,200</text>
  <text x="620" y="528" font-size="12" fill="#888">Jan 12, 2025</text>

  <!-- Order Row 5 -->
  <line x1="52" y1="550" x2="792" y2="550" stroke="#f0f0f0"/>
  <text x="68" y="568" font-size="13" font-weight="600" fill="#1a237e">ORD-20250105-I9J0</text>
  <text x="200" y="568" font-size="13" fill="#333">CloudBase Inc</text>
  <rect x="380" y="556" width="80" height="22" rx="10" fill="#e8f5e9"/>
  <text x="420" y="572" text-anchor="middle" font-size="11" font-weight="600" fill="#388e3c">SHIPPED</text>
  <text x="500" y="568" font-size="13" font-weight="600" fill="#333">₹1,75,000</text>
  <text x="620" y="568" font-size="12" fill="#888">Jan 11, 2025</text>

  <!-- Status Distribution Card -->
  <rect x="832" y="280" width="420" height="200" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="852" y="316" font-size="16" font-weight="600" fill="#333">Order Status Distribution</text>

  <!-- Pie Chart Representation -->
  <circle cx="970" cy="410" r="65" fill="none" stroke="#e8f5e9" stroke-width="20"/>
  <circle cx="970" cy="410" r="65" fill="none" stroke="#fff3e0" stroke-width="20" stroke-dasharray="120 290" stroke-dashoffset="-40"/>
  <circle cx="970" cy="410" r="65" fill="none" stroke="#e8eaf6" stroke-width="20" stroke-dasharray="60 350" stroke-dashoffset="-170"/>
  <circle cx="970" cy="410" r="65" fill="none" stroke="#fef2f2" stroke-width="20" stroke-dasharray="30 380" stroke-dashoffset="-230"/>

  <!-- Legend -->
  <rect x="1070" y="350" width="12" height="12" rx="3" fill="#e8f5e9"/>
  <text x="1090" y="362" font-size="12" fill="#555">Delivered (52%)</text>
  <rect x="1070" y="375" width="12" height="12" rx="3" fill="#fff3e0"/>
  <text x="1090" y="387" font-size="12" fill="#555">Pending (24%)</text>
  <rect x="1070" y="400" width="12" height="12" rx="3" fill="#e8eaf6"/>
  <text x="1090" y="412" font-size="12" fill="#555">Processing (18%)</text>
  <rect x="1070" y="425" width="12" height="12" rx="3" fill="#fef2f2"/>
  <text x="1090" y="437" font-size="12" fill="#555">On Hold (6%)</text>

  <!-- AI Insight Card -->
  <rect x="832" y="495" width="420" height="205" rx="12" fill="white" filter="url(#shadow)"/>
  <rect x="832" y="495" width="8" height="205" rx="4" fill="url(#grad1)"/>
  <text x="860" y="530" font-size="16" font-weight="600" fill="#333">🤖 AI Co-Pilot Insights</text>
  <text x="860" y="560" font-size="13" fill="#555">• 3 orders on hold — stock verification needed</text>
  <text x="860" y="582" font-size="13" fill="#555">• 2 pending payments in billing system</text>
  <text x="860" y="604" font-size="13" fill="#555">• Inventory low: SSL-WILD-1Y (restock soon)</text>
  <text x="860" y="626" font-size="13" fill="#555">• Peak order processing time: 2-4 PM</text>
  <rect x="860" y="650" width="160" height="34" rx="8" fill="url(#grad1)"/>
  <text x="940" y="672" text-anchor="middle" font-size="13" font-weight="600" fill="white">View Details →</text>
</svg>
