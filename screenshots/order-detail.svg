  <text x="740" y="474" font-size="13" fill="#333">₹2,49,999</text><text x="920" y="474" font-size="13" font-weight="600" fill="#333">₹4,99,998</text>
  <line x1="52" y1="490" x2="1230" y2="490" stroke="#f0f0f0"/>
