  <text x="320" y="514" font-size="13" fill="#555">CLD-STO-1TB</text><text x="480" y="514" font-size="13" fill="#555">Software</text>
  <text x="640" y="514" font-size="13" fill="#333">5</text>
  <text x="740" y="514" font-size="13" fill="#333">₹59,999</text><text x="920" y="514" font-size="13" font-weight="600" fill="#333">₹2,99,995</text>
