<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <linearGradient id="nav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/><stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/><stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1280" height="720" fill="#f5f7fa"/>
  <!-- Navbar -->
  <rect width="1280" height="56" fill="url(#nav)"/>
  <text x="24" y="36" font-size="20" font-weight="700" fill="white">⚡ IntelliOps</text>
  <text x="200" y="36" font-size="14" fill="rgba(255,255,255,0.8)">Dashboard</text>
  <text x="305" y="36" font-size="14" fill="white" font-weight="600">+ New Order</text>
  <text x="410" y="36" font-size="14" fill="rgba(255,255,255,0.8)">AI Co-Pilot</text><text x="520" y="36" font-size="14" fill="rgba(255,255,255,0.8)">System</text>
  <circle cx="1180" cy="28" r="14" fill="rgba(255,255,255,0.2)"/>
  <text x="1180" y="33" text-anchor="middle" font-size="12" font-weight="600" fill="white">J</text>
  <!-- Back link -->
  <text x="32" y="88" font-size="14" fill="#7c4dff" font-weight="500">← Back to Orders</text>
  <!-- Header -->
  <text x="32" y="126" font-size="24" font-weight="700" fill="#1a1a2e">Create New Order</text>
  <text x="32" y="146" font-size="13" fill="#888">Fill in the details below to create a new enterprise order</text>
  <!-- Form Card -->
  <rect x="32" y="166" width="800" height="540" rx="12" fill="white" filter="url(#shadow)"/>
  <!-- Customer Section -->
  <text x="52" y="200" font-size="20">👤</text>
  <text x="80" y="202" font-size="16" font-weight="600" fill="#333">Customer Information</text>
  <text x="52" y="230" font-size="13" font-weight="600" fill="#444">Customer Name <tspan fill="#f44336">*</tspan></text>
  <rect x="52" y="238" width="360" height="38" rx="8" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="66" y="262" font-size="13" fill="#333">Acme Corporation</text>
  <text x="436" y="230" font-size="13" font-weight="600" fill="#444">Email <tspan fill="#f44336">*</tspan></text>
  <rect x="436" y="238" width="376" height="38" rx="8" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="262" font-size="13" fill="#333">contact@acmecorp.com</text>
  <text x="52" y="300" font-size="13" font-weight="600" fill="#444">Phone Number</text>
  <rect x="52" y="308" width="360" height="38" rx="8" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="66" y="332" font-size="13" fill="#555">+1-555-0123</text>
  <text x="436" y="300" font-size="13" font-weight="600" fill="#444">Address</text>
  <rect x="436" y="308" width="376" height="38" rx="8" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="332" font-size="13" fill="#555">123 Business Ave, New York, NY</text>
  <line x1="52" y1="365" x2="812" y2="365" stroke="#f0f0f0"/>
  <!-- Order Items -->
  <text x="52" y="398" font-size="20">📦</text>
  <text x="80" y="400" font-size="16" font-weight="600" fill="#333">Order Items</text>
  <text x="700" y="400" font-size="11" font-weight="600" fill="#283593">3 item(s)</text>
  <rect x="52" y="420" width="760" height="30" rx="6" fill="#f8f9fc"/>
  <text x="68" y="440" font-size="10" font-weight="600" fill="#888">PRODUCT</text><text x="280" y="440" font-size="10" font-weight="600" fill="#888">SKU</text>
  <text x="420" y="440" font-size="10" font-weight="600" fill="#888">QTY</text><text x="520" y="440" font-size="10" font-weight="600" fill="#888">UNIT PRICE</text>
  <text x="640" y="440" font-size="10" font-weight="600" fill="#888">SUBTOTAL</text>
  <!-- Item 1 -->
  <rect x="52" y="458" width="230" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="66" y="479" font-size="12" fill="#333">Enterprise Server Rack</text>
  <rect x="290" y="458" width="120" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="304" y="479" font-size="12" fill="#555">SRV-RACK-42U</text>
  <rect x="418" y="458" width="60" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="448" y="479" text-anchor="middle" font-size="12" fill="#333">2</text>
  <rect x="486" y="458" width="110" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="541" y="479" text-anchor="middle" font-size="12" fill="#333">₹2,49,999</text>
  <text x="640" y="479" font-size="13" font-weight="600" fill="#1a237e">₹4,99,998</text>
  <!-- Item 2 -->
  <rect x="52" y="500" width="230" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="66" y="521" font-size="12" fill="#333">Cloud Storage License</text>
  <rect x="290" y="500" width="120" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="304" y="521" font-size="12" fill="#555">CLD-STO-1TB</text>
  <rect x="418" y="500" width="60" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="448" y="521" text-anchor="middle" font-size="12" fill="#333">5</text>
  <rect x="486" y="500" width="110" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="541" y="521" text-anchor="middle" font-size="12" fill="#333">₹59,999</text>
  <text x="640" y="521" font-size="13" font-weight="600" fill="#1a237e">₹2,99,995</text>
  <!-- Item 3 -->
  <rect x="52" y="542" width="230" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="66" y="563" font-size="12" fill="#333">Network Switch 48-Port</text>
  <rect x="290" y="542" width="120" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="304" y="563" font-size="12" fill="#555">NET-SW-48G</text>
  <rect x="418" y="542" width="60" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="448" y="563" text-anchor="middle" font-size="12" fill="#333">3</text>
  <rect x="486" y="542" width="110" height="34" rx="6" fill="#f8f9fc" stroke="#ddd" stroke-width="1"/>
  <text x="541" y="563" text-anchor="middle" font-size="12" fill="#333">₹1,29,999</text>
  <text x="640" y="563" font-size="13" font-weight="600" fill="#1a237e">₹3,89,997</text>
  <!-- Summary -->
  <rect x="52" y="590" width="760" height="50" rx="8" fill="#f8f9fc"/>
  <text x="600" y="612" font-size="13" fill="#555">Subtotal (10 items):</text><text x="720" y="612" font-size="13" font-weight="600" fill="#333">₹11,89,990</text>
  <text x="600" y="632" font-size="13" fill="#555">Tax (18% GST):</text><text x="720" y="632" font-size="13" font-weight="600" fill="#333">₹2,14,198</text>
  <!-- Total -->
  <line x1="52" y1="650" x2="812" y2="650" stroke="#e0e0e0" stroke-width="2"/>
  <text x="52" y="680" font-size="14" font-weight="600" fill="#333">Total Amount</text>
  <text x="700" y="680" font-size="22" font-weight="700" fill="#1a237e">₹14,04,188</text>
  <!-- Actions -->
  <rect x="560" y="695" width="120" height="40" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="620" y="720" text-anchor="middle" font-size="13" fill="#666">Cancel</text>
  <rect x="690" y="695" width="140" height="40" rx="8" fill="url(#grad1)"/>
  <text x="760" y="720" text-anchor="middle" font-size="13" font-weight="600" fill="white">🚀 Create Order</text>
</svg>
