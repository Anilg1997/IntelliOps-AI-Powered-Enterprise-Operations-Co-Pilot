<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/><stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/><stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/><stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/><stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c4dff"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#f5f7fa"/>

  <!-- Title -->
  <text x="640" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#1a237e">⚡ IntelliOps — End-to-End Architecture</text>
  <text x="640" y="72" text-anchor="middle" font-size="13" fill="#888">AI-Powered Enterprise Operations Co-Pilot</text>

  <!-- User Layer -->
  <rect x="490" y="90" width="300" height="50" rx="10" fill="white" stroke="#7c4dff" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="120" text-anchor="middle" font-size="14" font-weight="600" fill="#1a237e">👤 Support Engineer</text>

  <!-- Arrow down -->
  <line x1="640" y1="140" x2="640" y2="170" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Frontend Layer -->
  <rect x="390" y="175" width="500" height="55" rx="10" fill="url(#box1)" filter="url(#shadow)"/>
  <text x="640" y="200" text-anchor="middle" font-size="15" font-weight="600" fill="white">🌐 Angular 17 Frontend</text>
  <text x="640" y="218" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">JWT Auth · GraphQL (Apollo) · SSE Streaming · Dashboards</text>

  <!-- Auth arrow -->
  <line x1="460" y1="230" x2="460" y2="260" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Auth Service -->
  <rect x="350" y="265" width="220" height="50" rx="10" fill="white" stroke="#ff6b6b" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="380" cy="290" r="6" fill="#4caf50"/>
  <text x="395" y="295" font-size="13" font-weight="600" fill="#1a237e">🔐 Auth Service</text>
  <text x="395" y="308" font-size="10" fill="#888">JWT · Spring Security · bcrypt</text>

  <!-- Arrow to AI -->
  <line x1="640" y1="230" x2="640" y2="265" stroke="#7c4dff" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- AI Co-Pilot Layer -->
  <rect x="520" y="265" width="350" height="60" rx="10" fill="white" stroke="#7c4dff" stroke-width="2" filter="url(#shadow)"/>
  <text x="695" y="290" text-anchor="middle" font-size="14" font-weight="600" fill="#1a237e">🤖 AI Co-Pilot Service</text>
  <text x="695" y="308" text-anchor="middle" font-size="11" fill="#888">LangChain4j · Ollama · RAG (pgvector) · MCP Tools</text>

  <!-- MCP Tool arrows -->
  <line x1="600" y1="325" x2="400" y2="360" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="695" y1="325" x2="695" y2="360" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="790" y1="325" x2="920" y2="360" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Service Layer -->
  <!-- Order Service -->
  <rect x="250" y="365" width="250" height="60" rx="10" fill="white" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="390" text-anchor="middle" font-size="14" font-weight="600" fill="#1a237e">📋 Order Service</text>
  <text x="375" y="408" text-anchor="middle" font-size="11" fill="#888">REST + GraphQL · PostgreSQL</text>

  <!-- Inventory Service -->
  <rect x="560" y="365" width="270" height="60" rx="10" fill="white" stroke="#2196f3" stroke-width="2" filter="url(#shadow)"/>
  <text x="695" y="390" text-anchor="middle" font-size="14" font-weight="600" fill="#1a237e">📦 Inventory Service</text>
  <text x="695" y="408" text-anchor="middle" font-size="11" fill="#888">MongoDB · gRPC (internal)</text>

  <!-- Billing Service -->
  <rect x="880" y="365" width="220" height="60" rx="10" fill="white" stroke="#ff9800" stroke-width="2" filter="url(#shadow)"/>
  <text x="990" y="390" text-anchor="middle" font-size="14" font-weight="600" fill="#1a237e">💰 Billing Service</text>
  <text x="990" y="408" text-anchor="middle" font-size="11" fill="#888">Oracle + SOAP · Kafka</text>

  <!-- Kafka arrow -->
  <line x1="500" y1="395" x2="560" y2="395" stroke="#9c27b0" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="530" y="388" text-anchor="middle" font-size="9" fill="#9c27b0">gRPC</text>

  <!-- Messaging arrow -->
  <line x1="375" y1="425" x2="990" y2="425" stroke="#ff5722" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="680" y="418" text-anchor="middle" font-size="10" fill="#ff5722">Kafka Events</text>

  <!-- Arrow down to DBs -->
  <line x1="375" y1="425" x2="375" y2="460" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="695" y1="425" x2="695" y2="460" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="990" y1="425" x2="990" y2="460" stroke="#7c4dff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Database Layer -->
  <rect x="250" y="465" width="250" height="55" rx="10" fill="white" stroke="#336791" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="490" text-anchor="middle" font-size="14" font-weight="600" fill="#1a237e">🐘 PostgreSQL (ACID)</text>
  <text x="375" y="506" text-anchor="middle" font-size="10" fill="#666">Orders · Customers · Users</text>

  <rect x="560" y="465" width="270" height="55" rx="10" fill="white" stroke="#47A248" stroke-width="2" filter="url(#shadow)"/>
  <text x="695" y="490" text-anchor="middle" font-size="14" font-weight="600" fill="#1a237e">🍃 MongoDB</text>
  <text x="695" y="506" text-anchor="middle" font-size="10" fill="#666">Products · Catalog · Stock</text>

  <rect x="880" y="465" width="220" height="55" rx="10" fill="white" stroke="#c74634" stroke-width="2" filter="url(#shadow)"/>
  <text x="990" y="490" text-anchor="middle" font-size="14" font-weight="600" fill="#1a237e">🟠 Oracle DB</text>
  <text x="990" y="506" text-anchor="middle" font-size="10" fill="#666">Billing · Invoices · Payments</text>

  <!-- Bottom legend -->
  <rect x="200" y="550" width="880" height="150" rx="12" fill="white" filter="url(#shadow)"/>
  <text x="640" y="580" text-anchor="middle" font-size="16" font-weight="600" fill="#1a237e">Technology Stack</text>
  <!-- Tech badges -->
  <rect x="230" y="600" width="150" height="28" rx="14" fill="#667eea"/>
  <text x="305" y="619" text-anchor="middle" font-size="12" font-weight="600" fill="white">Java 17 + Spring Boot</text>
  <rect x="400" y="600" width="130" height="28" rx="14" fill="#4caf50"/>
  <text x="465" y="619" text-anchor="middle" font-size="12" font-weight="600" fill="white">Angular 17</text>
  <rect x="550" y="600" width="130" height="28" rx="14" fill="#ff6b6b"/>
  <text x="615" y="619" text-anchor="middle" font-size="12" font-weight="600" fill="white">JWT Auth</text>
  <rect x="700" y="600" width="140" height="28" rx="14" fill="#9c27b0"/>
  <text x="770" y="619" text-anchor="middle" font-size="12" font-weight="600" fill="white">GraphQL + gRPC</text>
  <rect x="860" y="600" width="160" height="28" rx="14" fill="#ff9800"/>
  <text x="940" y="619" text-anchor="middle" font-size="12" font-weight="600" fill="white">Kafka + Ollama AI</text>
  <!-- Row 2 -->
  <rect x="230" y="640" width="170" height="28" rx="14" fill="#336791"/>
  <text x="315" y="659" text-anchor="middle" font-size="12" font-weight="600" fill="white">PostgreSQL + pgvector</text>
  <rect x="420" y="640" width="130" height="28" rx="14" fill="#47A248"/>
  <text x="485" y="659" text-anchor="middle" font-size="12" font-weight="600" fill="white">MongoDB 7</text>
  <rect x="570" y="640" width="150" height="28" rx="14" fill="#c74634"/>
  <text x="645" y="659" text-anchor="middle" font-size="12" font-weight="600" fill="white">Oracle XE (SOAP)</text>
  <rect x="740" y="640" width="140" height="28" rx="14" fill="#7c4dff"/>
  <text x="810" y="659" text-anchor="middle" font-size="12" font-weight="600" fill="white">Docker + AWS</text>
  <rect x="900" y="640" width="140" height="28" rx="14" fill="#00bcd4"/>
  <text x="970" y="659" text-anchor="middle" font-size="12" font-weight="600" fill="white">GitHub Actions</text>
</svg>
