<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI', -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="50%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#3949ab"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Success Card -->
  <rect x="340" y="120" width="600" height="460" rx="16" fill="white" filter="url(#shadow)"/>
  <!-- Success Icon -->
  <circle cx="640" cy="200" r="40" fill="#e8f5e9"/>
  <text x="640" y="212" text-anchor="middle" font-size="36">✓</text>
  <text x="640" y="270" text-anchor="middle" font-size="24" font-weight="700" fill="#1a237e">Registration Successful!</text>
  <text x="640" y="300" text-anchor="middle" font-size="14" fill="#666">Your IntelliOps account has been created successfully.</text>
  <rect x="640" y="340" text-anchor="middle" width="280" height="46" rx="10" fill="#7c4dff" transform="translate(-140,0)"/>
  <text x="640" y="369" text-anchor="middle" font-size="15" font-weight="600" fill="white">Go to Dashboard</text>
  <text x="640" y="420" text-anchor="middle" font-size="13" fill="#666">You'll receive a welcome email with getting started guide.</text>
</svg>
