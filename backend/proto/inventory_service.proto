syntax = "proto3";

package intellops.inventory;

option java_package = "com.intellops.proto.inventory";
option java_multiple_files = true;

service InventoryGrpcService {
  rpc CheckStock (StockCheckRequest) returns (StockCheckResponse);
  rpc ReserveStock (StockReserveRequest) returns (StockReserveResponse);
  rpc ReleaseStock (StockReleaseRequest) returns (StockReleaseResponse);
  rpc GetProduct (GetProductRequest) returns (GetProductResponse);
  rpc ListProducts (ListProductsRequest) returns (ListProductsResponse);
}

message StockCheckRequest {
  string product_id = 1;
  int32 requested_quantity = 2;
}

message StockCheckResponse {
  bool in_stock = 1;
  int32 available_quantity = 2;
  int32 reserved_quantity = 3;
  string reorder_status = 4;
  string estimated_restock_date = 5;
}

message StockReserveRequest {
  string order_id = 1;
  string product_id = 2;
  int32 quantity = 3;
  int32 reservation_ttl_minutes = 4;
}

message StockReserveResponse {
  bool success = 1;
  string reservation_id = 2;
  string message = 3;
}

message StockReleaseRequest {
  string reservation_id = 1;
  string order_id = 2;
}

message StockReleaseResponse {
  bool success = 1;
  string message = 2;
}

message GetProductRequest {
  string product_id = 1;
}

message GetProductResponse {
  string id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  double price = 5;
  string category = 6;
  int32 stock_quantity = 7;
  int32 reorder_threshold = 8;
  bool active = 9;
}

message ListProductsRequest {
  string category = 1;
  bool active_only = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListProductsResponse {
  repeated GetProductResponse products = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}
