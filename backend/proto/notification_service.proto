syntax = "proto3";

package intellops.notification;

option java_package = "com.intellops.proto.notification";
option java_multiple_files = true;

service NotificationService {
  rpc SendNotification (NotificationRequest) returns (NotificationResponse);
  rpc GetActivityLog (ActivityLogRequest) returns (ActivityLogResponse);
}

message NotificationRequest {
  string entity_id = 1;
  string entity_type = 2;
  string event_type = 3;
  string message = 4;
  map<string, string> metadata = 5;
}

message NotificationResponse {
  bool success = 1;
  string notification_id = 2;
  string message = 3;
}

message ActivityLogRequest {
  string entity_id = 1;
  string entity_type = 2;
  int32 limit = 3;
}

message ActivityLogResponse {
  repeated ActivityEntry entries = 1;
  int32 total_count = 2;
}

message ActivityEntry {
  string id = 1;
  string event_type = 2;
  string source = 3;
  string entity_id = 4;
  string entity_type = 5;
  map<string, string> details = 6;
  int64 timestamp = 7;
}
