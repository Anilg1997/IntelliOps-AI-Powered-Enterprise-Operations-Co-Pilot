server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/intellops_auth
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

# ─── JWT Configuration ─────────────────────────────────────────────────────
app:
  jwt:
    secret: "IntelliOps-AI-Powered-Enterprise-Operations-Co-Pilot-JWT-Secret-Key-2024-2025-2026"
    expiration-ms: 86400000  # 24 hours

logging:
  level:
    com.intellops: DEBUG

---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
