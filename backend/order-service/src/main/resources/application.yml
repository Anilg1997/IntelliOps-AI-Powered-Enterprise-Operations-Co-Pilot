server:
  port: 8081

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/intellops_order
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    properties:
      spring.json.trusted.packages: com.intellops.order.events

  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: /graphql
    schema:
      locations: classpath:graphql/

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080

jwt:
  secret: IntelliOps-JWT-Secret-Key-2024-Enterprise-Operations-CoPilot-Super-Secret
  issuer: intellops-platform

grpc:
  client:
    inventoryGrpcService:
      address: localhost:9091
      negotiationType: PLAINTEXT

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.intellops: DEBUG
    net.devh: DEBUG
