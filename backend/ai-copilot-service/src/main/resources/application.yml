server:
  port: 8083

spring:
  application:
    name: ai-copilot-service

  datasource:
    url: jdbc:postgresql://localhost:5432/intellops_order
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    mongodb:
      uri: mongodb://admin:Mongo%402024@localhost:27017/intellops_copilot?authSource=admin

  flyway:
    enabled: true
    locations: classpath:db/migration

intellops:
  ai:
    ollama:
      base-url: http://localhost:11434
      model: llama3.1
      temperature: 0.7
    tools:
      order-service-url: http://localhost:8081
      inventory-service-url: http://localhost:8082
      billing-service-url: http://localhost:8084
    rag:
      enabled: true
      store: pgvector
      chunk-size: 500
      chunk-overlap: 50
      chroma:
        base-url: http://localhost:8000
        collection: atlasops_embeddings
      embedding-model: nomic-embed-text

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.intellops: DEBUG
    dev.langchain4j: DEBUG
