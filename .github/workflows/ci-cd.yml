name: IntelliOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Build & Test All Services
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intellops_order
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: Mongo@2024
        ports:
          - 27017:27017

      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
        ports:
          - 9092:9092

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build All Services
        run: mvn clean compile -DskipTests

      - name: Run Unit Tests
        run: mvn test -pl backend/auth-service,backend/order-service

      - name: Package Services
        run: mvn package -DskipTests -q

  docker-build:
    name: Build Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Auth Service Image
        run: docker build -f Dockerfile.auth -t intellops-auth:${{ github.sha }} .

      - name: Build Order Service Image
        run: docker build -f Dockerfile.billing -t intellops-billing:${{ github.sha }} .

      - name: Build Inventory Service Image
        run: docker build -f Dockerfile.inventory -t intellops-inventory:${{ github.sha }} .

  deploy-preview:
    name: Deploy Preview
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **IntelliOps Preview Deployed!**\n\nAll services built successfully. Run `docker-compose up -d` locally to test.'
            })
