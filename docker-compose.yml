version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: intellops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intellops_order
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: intellops-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: intellops-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: intellops-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"

  mongodb:
    image: mongo:7
    container_name: intellops-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: Mongo@2024
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./infra/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: ../Dockerfile.inventory
    container_name: intellops-inventory
    depends_on:
      mongodb:
        condition: service_started
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:Mongo%402024@mongodb:27017/intellops_inventory?authSource=admin
      GRPC_SERVER_PORT: 9091
    ports:
      - "8082:8082"
      - "9091:9091"

  ai-copilot-service:
    image: eclipse-temurin:17-jre-alpine
    container_name: intellops-copilot
    depends_on:
      postgres:
        condition: service_started
      mongodb:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/intellops_order
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_MONGODB_URI: mongodb://admin:Mongo%402024@mongodb:27017/intellops_copilot?authSource=admin
      INTELLOPS_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
      SERVER_PORT: 8083
    ports:
      - "8083:8083"

volumes:
  postgres-data:
  mongo-data:
